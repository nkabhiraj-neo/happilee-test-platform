    }

    function Feature({ feature, filter, videoIndex }) {
      const els = (feature.elements || []).filter(el => filter === 'all' || scenSt(el) === filter);
      if (!els.length) return null;
      const uri = (feature.uri || '').replace(/\\/g, '/');
      return (
        <div className="fblock afu">
          <div className="fbar">
            <span className="ficon">📁</span>
            <span className="fname">{feature.name}</span>
            <span className="furi">{uri}</span>
            <span className="fcnt">{els.length} scenario{els.length > 1 ? 's' : ''}</span>
          </div>
          {els.map((el, i) => <Scenario key={el.id || i} el={el} autoOpen={scenSt(el) === 'failed'} videoIndex={videoIndex} featureUri={uri} />)}
        </div>
      );
    }

    function LiveMonitor() {
      const [data, setData] = React.useState(null);
      const [elapsed, setElapsed] = React.useState(0);
      const elapsedRef = React.useRef(null);

      React.useEffect(() => {
        const poll = setInterval(async () => {
          try {
            const res = await fetch('./reports/live-status.json?t=' + Date.now(), { cache: 'no-store' });
            if (!res.ok) return;
            const json = await res.json();
            setData(json);
          } catch { }
        }, 500);
        return () => clearInterval(poll);
      }, []);

      React.useEffect(() => {
        if (data?.state === 'running') {
          setElapsed(0);
          elapsedRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
        } else {
          if (elapsedRef.current) clearInterval(elapsedRef.current);
          setElapsed(0);
        }
        return () => {
          if (elapsedRef.current) clearInterval(elapsedRef.current);
        };
      }, [data?.state, data?.currentStepIndex]);

      if (!data || data.state === 'idle') {
        return (
          <div className="live-panel">
            <div className="live-idle-state">
              <span className="live-idle-icon">⏸</span>
              <div className="live-idle-title">Waiting for tests to start</div>
              <div className="live-idle-sub">Run: npm run test:project</div>
            </div>
          </div>
        );
      }

      const steps = data.steps || [];
      const total = steps.length;
      const done = data.totalPassed + data.totalFailed + data.totalSkipped;
      const currentStep = steps[data.currentStepIndex];
      const pPct = total ? (data.totalPassed / total) * 100 : 0;
      const fPct = total ? (data.totalFailed / total) * 100 : 0;
      const stateLabel = data.state === 'running' ? 'Running' : 'Completed';
      const featureShort = (data.feature || '').split('/').pop() || data.feature;

      return (
        <div className="live-panel">
          <div className="live-panel-header">
            <div className={`live-state-badge ${data.state}`}>
              {data.state === 'running' && <span className="live-pulse" />}
              {stateLabel}
            </div>
            <div className="live-scenario-name">{data.scenario}</div>
            <span style={{ fontSize: 11, color: 'var(--text3)', fontFamily: 'var(--mono)', flexShrink: 0 }}>{featureShort}</span>
            <span style={{ fontSize: 11, color: 'var(--text3)', fontFamily: 'var(--mono)', flexShrink: 0 }}>{done}/{total} steps</span>
          </div>
          <div className="live-body">
            <div className="live-steps-col">
              {steps.map((step, i) => {
                const icon = step.status === 'passed' ? '✓' : step.status === 'failed' ? '✕' : step.status === 'running' ? '▶' : step.status === 'skipped' ? '–' : '·';
                return (
                  <div key={i} className={`live-step-row ${step.status}`}>
                    <div className={`live-step-icon ${step.status}`}>{icon}</div>
                    <span className="live-step-kw">{(step.keyword || '').trim()}</span>
                    <span className="live-step-name">{step.name}</span>
                    {step.duration && <span className="live-step-dur">{ns2ms(step.duration)}</span>}
                    {step.status === 'running' && <div className="live-running-indicator"><span /><span /><span /></div>}
                    {step.status === 'failed' && step.error && (
                      <div className="live-error-box" style={{ width: '100%', flexBasis: '100%', marginTop: 6 }}>{step.error}</div>
                    )}
                  </div>
                );
              })}
              <div className="live-progress-wrap">
                <div className="live-progress-label">
                  <span>{done} of {total} steps done</span>
                  <span style={{ color: data.totalFailed > 0 ? 'var(--fail)' : data.state === 'completed' ? 'var(--pass)' : 'var(--text3)' }}>
                    {data.state === 'completed' ? data.totalFailed > 0 ? '✕ ' + data.totalFailed + ' failed' : '✓ All passed' : 'running...'}
                  </span>
                </div>
                <div className="live-progress-track">
                  <div className="live-progress-pass" style={{ width: `${pPct}%` }} />
                  <div className="live-progress-fail" style={{ width: `${fPct}%` }} />
                </div>
              </div>
            </div>
            <div className="live-right-col">
              <div className="live-current-card">
                <div className="live-current-label">
                  {data.state === 'running' ? '▶ Running now' : data.state === 'completed' ? '✓ Completed' : 'Last step'}
                </div>
                {currentStep ? (
                  <>
                    <div className="live-current-step">
                      <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--blue)', marginRight: 6 }}>{(currentStep.keyword || '').trim()}</span>
                      {currentStep.name}
                    </div>
                    {data.state === 'running' && <div className="live-current-elapsed">⏱ {elapsed}s elapsed</div>}
                    {currentStep.duration && <div className="live-current-elapsed">⏱ {ns2ms(currentStep.duration)}</div>}
                    {currentStep.error && <pre className="live-error-box">{currentStep.error}</pre>}
                  </>
                ) : (
                  <div style={{ fontSize: 12, color: 'var(--text3)' }}>No step running yet</div>
                )}
              </div>
              <div className="live-counters">
                <div className="live-counter"><div className="live-counter-val p">{data.totalPassed}</div><div className="live-counter-label">Passed</div></div>
                <div className="live-counter"><div className="live-counter-val f">{data.totalFailed}</div><div className="live-counter-label">Failed</div></div>
                <div className="live-counter"><div className="live-counter-val s">{data.totalSkipped}</div><div className="live-counter-label">Skipped</div></div>
              </div>
              {data.startedAt && (
                <div style={{ marginTop: 14, padding: '10px 12px', background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 'var(--r-sm)', fontSize: 12, color: 'var(--text2)', fontFamily: 'var(--mono)' }}>
                  ⏱ Run time: {data.completedAt ? `${((data.completedAt - data.startedAt) / 1000).toFixed(1)}s` : `${Math.floor((Date.now() - data.startedAt) / 1000)}s...`}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function HistItem({ entry, active, onClick, isLatest, moduleId }) {
      const failed = Number(entry.failedScenarios || 0);
      const passed = Number(entry.passedScenarios || 0);
      const ov = failed > 0 ? 'failed' : 'passed';
      return (
        <div className={`hitem ${active ? 'ac' : ''}`} onClick={onClick}>
          <span className="hnum">{shortRunId(entry.id)}</span>
          <span className={`hdot ${ov}`} />
          <span className="hname">{runLabel(entry, moduleId)}</span>
          <div className="hpills">
            <span className="hpill hp">✓ {passed}</span>
            {failed > 0 && <span className="hpill hf">✕ {failed}</span>}
            {isLatest && <span className="hpill hk">Latest</span>}
          </div>
          <span className="htime">{fmtRunDate(entry.timestamp)}</span>
        </div>
      );
    }

    function App() {
      const [theme, setTheme] = useState(() => localStorage.getItem('hq_theme') || 'light');
      const [selectedBlock, setSelectedBlock] = useState(() => readRoute().blockId || localStorage.getItem('hq_block') || '_hap_fe_project');
      const [routePage, setRoutePage] = useState(() => readRoute().page);
      const [features, setFeatures] = useState(null);
      const [fileName, setFileName] = useState(null);
      const [filter, setFilter] = useState('all');
      const [history, setHistory] = useState([]);
      const [activeId, setActiveId] = useState(null);
      const [autoLoadBlocked, setAutoLoadBlocked] = useState(false);
      const [lastLoadedAt, setLastLoadedAt] = useState(null);
      const [loading, setLoading] = useState(true);
      const [liveMode, setLiveMode] = useState(() => localStorage.getItem('hq_live') === 'true');
      const [countdown, setCountdown] = useState(5);
      const [notificationBanner, setNotificationBanner] = useState(null);
      const [flashCards, setFlashCards] = useState(false);
      const [videoIndex, setVideoIndex] = useState({});
      const [runMeta, setRunMeta] = useState(null);
      const [selectedScenarioId, setSelectedScenarioId] = useState(null);
      const prevStats = useRef(null);

      useEffect(() => {
        fetch('./reports/videos/index.json?t=' + Date.now(), { cache: 'no-store' })
          .then(r => r.json())
          .then(data => setVideoIndex(data))
          .catch(() => setVideoIndex({}));
      }, []);
      const loadRunHistory = useCallback(() => {
        fetch('./reports/run-history.json?t=' + Date.now(), { cache: 'no-store' })
          .then(r => r.ok ? r.json() : [])
          .then(data => {
            const sorted = (Array.isArray(data) ? data : []).sort((a, b) => Number(b.id) - Number(a.id)).slice(0, 20);
            setHistory(sorted);
          })
          .catch(() => setHistory([]));
      }, []);
      const blockInfo = BLOCKS.find(b => b.id === selectedBlock);
      const reportUrl = blockInfo?.url || './reports/_hap_fe_project.json';

      const loadFromUrl = useCallback((block) => {
        const b = block || selectedBlock;
        const url = BLOCKS.find(x => x.id === b)?.url || './reports/_hap_fe_project.json';
        setLoading(true);
        setAutoLoadBlocked(false);
        fetch(url + '?t=' + Date.now(), { cache: 'no-store' })
          .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
          .then(data => {
            const fs = Array.isArray(data) ? data : (data.features || []);
            const meta = data._meta || null;
            if (!fs.length) { setFeatures(null); setFileName(null); setLoading(false); setNotificationBanner(null); return; }
            const newSt = stats(fs);
            const changed = prevStats.current && (prevStats.current.passed !== newSt.passed || prevStats.current.failed !== newSt.failed || prevStats.current.skipped !== newSt.skipped);
            if (changed) { setFlashCards(true); setTimeout(() => setFlashCards(false), 700); }
            if (prevStats.current) { if (newSt.failed > prevStats.current.failed) setNotificationBanner({ type: 'fail', msg: `⚠ New failure detected in ${b}` }); else if (newSt.failed === 0 && prevStats.current.failed > 0) setNotificationBanner({ type: 'pass', msg: '✅ All tests passing!' }); else if (!changed) setNotificationBanner(null); }
            prevStats.current = newSt;
            setFeatures(fs);
            setFileName(`${b}.json`);
            const currentRunId = meta?.runId || Date.now();
            setActiveId(currentRunId);
            setRunMeta({
              id: currentRunId,
              timestamp: meta?.generatedAt || new Date().toISOString(),
              passedScenarios: newSt.passed,
              failedScenarios: newSt.failed,
              totalScenarios: newSt.total
            });
            setSelectedScenarioId(null);
            setFilter('all');
            setLastLoadedAt(meta ? new Date(meta.generatedAt).getTime() : Date.now());
            loadRunHistory();
            setLoading(false);
          })
          .catch(() => { setAutoLoadBlocked(true); setLoading(false); setNotificationBanner(null); });
      }, [selectedBlock, loadRunHistory]);

      useEffect(() => { document.documentElement.setAttribute('data-theme', theme); localStorage.setItem('hq_theme', theme); }, [theme]);
      useEffect(() => { localStorage.setItem('hq_block', selectedBlock); prevStats.current = null; loadRunHistory(); loadFromUrl(selectedBlock); }, [selectedBlock, loadRunHistory]);
      useEffect(() => { localStorage.setItem('hq_live', liveMode); }, [liveMode]);
      useEffect(() => {
        const onHashChange = () => {
          const route = readRoute();
          setRoutePage(route.page);
          if (route.blockId && route.blockId !== selectedBlock) {
            prevStats.current = null;
            setSelectedBlock(route.blockId);
            setNotificationBanner(null);
          }
        };
        onHashChange();
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, [selectedBlock]);
      useEffect(() => {
        if (!liveMode) return;
        const iv = setInterval(() => { setCountdown(c => { if (c <= 1) { loadFromUrl(selectedBlock); return 5; } return c - 1; }); }, 1000);
        return () => clearInterval(iv);
      }, [liveMode, selectedBlock, loadFromUrl]);

      const onBlockChange = e => {
        const v = e.target.value;
        if (v) {
          prevStats.current = null;
          setSelectedBlock(v);
          setRoutePage('module');
          setNotificationBanner(null);
          writeRoute(BLOCK_TO_ROUTE[v] || 'dashboard');
        }
      };
      const onRunChange = e => {
        const runId = e.target.value;
        const run = history.find(h => String(h.id) === String(runId));
        if (!run) return;
        fetch(`./reports/runs/${run.id}/${selectedBlock}.json?t=` + Date.now(), { cache: 'no-store' })
          .then(r => r.ok ? r.json() : null)
          .then(data => {
            const fs = data?.features || [];
            if (fs.length) {
              setFeatures(fs);
              setFileName(`${selectedBlock}.json`);
              setActiveId(run.id);
              setRunMeta(run);
              setSelectedScenarioId(null);
              setFilter('all');
              setLastLoadedAt(new Date(run.timestamp).getTime());
            }
          });
      };

      const st = useMemo(() => features ? stats(features) : null, [features]);
      const dur = useMemo(() => features ? totalNs(features) : 0, [features]);
      const pRate = st ? Math.round((st.passed / Math.max(st.total, 1)) * 100) : 0;
      const curEntry = history.find(h => Number(h.id) === Number(activeId)) || runMeta;

      const totalSteps = features ? (features.flatMap(f => f.elements || []).flatMap(e => e.steps || []).filter(s => !s.hidden)).length : 0;
      const scenarioRows = useMemo(() => {
        if (!features) return [];
        return features.flatMap(feature =>
          (feature.elements || [])
            .filter(el => filter === 'all' || scenSt(el) === filter)
            .map((el, idx) => {
              const scenarioTag = (el.tags || []).map(t => t.name.replace('@', '')).find(t => t.startsWith('MLR-')) || '-';
              const rowId = `${feature.uri || feature.name}-${idx}-${el.name}`;
              const durationNs = (el.steps || []).filter(s => !s.hidden).reduce((sum, s) => sum + (s.result?.duration || 0), 0);
              return {
                id: rowId,
                feature,
                el,
                status: scenSt(el),
                tag: scenarioTag,
                durationNs
              };
            })
        ).sort((a, b) => {
          if (a.status === 'failed' && b.status !== 'failed') return -1;
          if (a.status !== 'failed' && b.status === 'failed') return 1;
          return 0;
        });
      }, [features, filter]);
      const selectedRow = scenarioRows.find(r => r.id === selectedScenarioId) || null;

      return (
        <div>
          <div className="mesh" />
          <div className="topline" />

          <header className="hdr">
            <div className="logo">
              <div className="lmark">💬</div>
              <div><div className="lname">Happilee</div><div className="ltag">QA Dashboard</div></div>
            </div>
            <div className="hactions">
              <button className={`btn ${routePage === 'dashboard' ? 'btnp' : ''}`} onClick={() => { setRoutePage('dashboard'); writeRoute('dashboard'); }}>🏠 Dashboard</button>
              <button className={`btn ${routePage === 'module' && selectedBlock === '_hap_fe_project' ? 'btnp' : ''}`} onClick={() => { prevStats.current = null; setSelectedBlock('_hap_fe_project'); setRoutePage('module'); writeRoute('projects'); }}>Projects</button>
              <button className={`btn ${routePage === 'module' && selectedBlock === '_hap_fe_auth' ? 'btnp' : ''}`} onClick={() => { prevStats.current = null; setSelectedBlock('_hap_fe_auth'); setRoutePage('module'); writeRoute('auth'); }}>Auth</button>
              <select className="block-select" value={selectedBlock} onChange={onBlockChange}>
                {BLOCKS.map(b => <option key={b.id} value={b.id} title={MODULE_META[b.id]?.technical}>{b.label}</option>)}
              </select>
              {history.length > 0 && (
                <select className="block-select" value={activeId || ''} onChange={onRunChange} title="Run selector">
                  {history.map((h, idx) => (
                    <option key={h.id} value={h.id}>
                      {runLabel(h, selectedBlock)}{idx === 0 ? ' • Latest' : ''}
                    </option>
                  ))}
                </select>
              )}
              {curEntry && (
                <div className="livepill" title={MODULE_META[selectedBlock]?.technical}>
                  {MODULE_META[selectedBlock]?.label} | Run {shortRunId(curEntry.id)} • {fmtRunDateShort(curEntry.timestamp)}
                </div>
              )}
              {features && <div className="livepill"><span className="ldot" />{fileName}</div>}
              {features && lastLoadedAt && !liveMode && <div className="livepill" style={{ marginRight: 4 }}>🕐 Last loaded: {fmtD(lastLoadedAt)}</div>}
              {features && liveMode && <div className="livepill" style={{ marginRight: 4 }}>{loading ? '🔄 Tests running...' : countdown > 1 ? `Refreshing in ${countdown}s...` : '✓ Up to date'}</div>}
              {features && <button className="btn btnp" onClick={() => loadFromUrl(selectedBlock)} disabled={loading}>🔄 Refresh</button>}
              <button className={`btn ${liveMode ? 'btnp' : ''}`} onClick={() => { const next = !liveMode; setLiveMode(next); localStorage.setItem('hq_live', String(next)); }} title={liveMode ? 'Live monitor ON' : 'Live monitor OFF'}>{liveMode ? '🟢 Live ON' : '⚫ Live OFF'}</button>
              <button className="btn btni" onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')}>{theme === 'light' ? '🌙' : '☀️'}</button>
            </div>
          </header>

          <main className="main">
            {routePage === 'dashboard' && (
              <div className="dropzone" style={{ cursor: 'default', marginBottom: 18 }}>
                <div className="dtitle afu">Dashboard Analysis</div>
                <div className="ddesc afu1" style={{ maxWidth: 840, margin: '0 auto 14px' }}>
                  Open a module workspace to inspect latest run first, then full run history with AI triage and evidence.
                </div>
                <div style={{ display: 'flex', gap: 10, justifyContent: 'center', flexWrap: 'wrap' }}>
                  <button className="dbtn afu2" onClick={() => { prevStats.current = null; setSelectedBlock('_hap_fe_project'); setRoutePage('module'); writeRoute('projects'); }}>Open Projects Analysis</button>
                  <button className="dbtn afu3" onClick={() => { prevStats.current = null; setSelectedBlock('_hap_fe_auth'); setRoutePage('module'); writeRoute('auth'); }}>Open Auth Analysis</button>
                </div>
                <div className="dhint afu4">Route examples: <code>#/projects</code> · <code>#/auth</code></div>
              </div>
            )}
            {routePage === 'module' && liveMode && (
              <div className="afu" style={{ marginBottom: 20 }}>
                <div className="secrow" style={{ marginBottom: 12 }}>
                  <span className="sectitle">Live Monitor</span>
                  <span style={{ fontSize: 12, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>Polling every 500ms · run npm run test:project to start</span>
                </div>
                <LiveMonitor />
              </div>
            )}
            {routePage === 'module' && !features && (
              <div className="dropzone" style={{ cursor: 'default' }}>
                <div className="dorb">📊</div>
                {loading ? (
                  <div className="dtitle afu">Loading report...</div>
                ) : (<>
                  <div className="dtitle afu">No report found — run your tests first</div>
                    <div className="ddesc afu1">
                      Run tests and copy reports to <code>docs/reports/</code><br />
                      From root: <code>npm run test:project</code> or <code>npm run test:auth</code>
                    </div>
                    {autoLoadBlocked && (
                      <div className="errblk" style={{ margin: '0 auto 20px', maxWidth: 480 }}>
                        <div className="errhdr"><span>⚠</span><span className="errtxt">Auto-load blocked by browser</span></div>
                        <div className="errbody" style={{ background: 'transparent', color: 'inherit', whiteSpace: 'normal' }}>
                          Open via a local server (<code>cd docs && npm run serve</code>) and run tests to generate reports.
                        </div>
                      <div style={{ padding: '8px 12px', borderTop: '1px solid var(--fail-ring)' }}>
                        <button className="btn" style={{ fontSize: 12 }} onClick={e => { e.stopPropagation(); loadFromUrl(); }}>🔄 Retry fetch</button>
                      </div>
                    </div>
                  )}
                  <div className="dhint afu2">Expected sources: <code>docs/reports/_hap_fe_project.json</code> and <code>docs/reports/_hap_fe_auth.json</code></div>
                </>)}
              </div>
            )}

            {routePage === 'module' && features && st && (<>
              {notificationBanner && <div className={`notif-banner ${notificationBanner.type}`}>{notificationBanner.msg}</div>}
              <div className="module-spotlight afu">
                <div>
                  <div className="spot-title">{MODULE_META[selectedBlock]?.label} Intelligence Overview</div>
                  <div className="spot-sub">
                    First-time friendly view: start with scenario table, then click one row for full AI + evidence diagnosis.
                  </div>
                </div>
                <div style={{display:'flex', gap:'8px', flexWrap:'wrap'}}>
                  <span style={{fontSize:'11px', padding:'4px 10px', borderRadius:'999px', background:'#eef2ff', color:'#4338ca', fontWeight:700}}>
                    Module: {MODULE_META[selectedBlock]?.label}
                  </span>
                  {curEntry && (
                    <span style={{fontSize:'11px', padding:'4px 10px', borderRadius:'999px', background:'#f1f5f9', color:'#334155', fontWeight:700}}>
                      Active Run {shortRunId(curEntry.id)}
                    </span>
                  )}
                </div>
              </div>
              <div className="hero">
                <div className="metrics">
                  {[
                    { cls: 'mc-tot', g: '📋', l: 'Total Scenarios', v: st.total, s: `${features.length} feature${features.length > 1 ? 's' : ''}`, a: 'afu' },
                    { cls: 'mc-pas', g: '✅', l: 'Passed Scenarios', v: st.passed, s: `${pRate}% pass rate`, a: 'afu1' },
                    { cls: 'mc-fai', g: '❌', l: 'Failed Scenarios', v: st.failed, s: st.failed > 0 ? 'needs attention' : 'all clear', a: 'afu2' },
                    { cls: 'mc-dur', g: '⏱', l: 'Duration', v: ns2s(dur), s: 'total run time', a: 'afu3' },
                  ].map(({ cls, g, l, v, s, a }) => (
                    <div key={cls} className={`mcard ${cls} ${a} ${flashCards ? 'flash' : ''}`}>
                      <div className="mglyph">{g}</div>
                      <div className="mlabel">{l}</div>
                      <div className="mval">{v}</div>
                      <div className="msub">{s}</div>
                    </div>
                  ))}
                </div>
                <Donut {...st} />
              </div>

              <div className="pstrip afu2">
                <div className="pstrip-hdr">
                  <span className="plabel">Pass / Fail / Skipped Distribution</span>
                  <span className="prate" style={{ color: st.failed > 0 ? 'var(--fail)' : 'var(--pass)' }}>
                    {st.failed > 0 ? `${st.failed} scenario${st.failed > 1 ? 's' : ''} need attention` : '✓ All passing'}
                  </span>
                </div>
                <div className="ptrack">
                  <div className="pseg ps" style={{ width: `${(st.passed / st.total) * 100}%` }} />
                  <div className="pseg pf" style={{ width: `${(st.failed / st.total) * 100}%` }} />
                  <div className="pseg pk" style={{ width: `${(st.skipped / st.total) * 100}%` }} />
                </div>
              </div>

              {curEntry && (
                <div className="metarow afu3">
                  {[['📄', 'File', fileName], ['🕐', 'Run', `Run ${shortRunId(curEntry.id)} • ${fmtRunDate(curEntry.timestamp)}`], ['📁', 'Features', features.length], ['🏷', 'Steps', totalSteps]].map(([icon, l, v]) => (
                    <div key={l} className="mi"><span>{icon}</span><span>{l}: <span className="miv">{v}</span></span></div>
                  ))}
                </div>
              )}

              <div className="secrow afu4">
                <span className="sectitle">Test Results</span>
                <div className="fgrp">
                  {[['all', 'All', ''], ['passed', '✓ Passed', 'fp'], ['failed', '✕ Failed', 'ff'], ['skipped', '– Skipped', 'fk']].map(([v, l, c]) => (
                    <button key={v} className={`fchip ${filter === v ? 'ac ' + c : ''}`} onClick={() => setFilter(v)}>
                      {l}{v !== 'all' ? ` (${v === 'passed' ? st.passed : v === 'failed' ? st.failed : st.skipped})` : ''}
                    </button>
                  ))}
                </div>
              </div>
              <div className="welcome-card afu4">
                <div className="welcome-title">Welcome to Happilee QA Intelligence</div>
                <div className="welcome-sub">
                  Select any scenario from the table to inspect AI diagnosis, step evidence, screenshots, videos, and API/network failures for that specific test.
                </div>
              </div>

              <div className="scenario-table-wrap">
                <div className="scenario-table-head">
                  <span>Status</span>
                  <span>Scenario</span>
                  <span>MLR</span>
                  <span>Duration</span>
                  <span>Feature</span>
                </div>
                {scenarioRows.map(row => (
                  <div
                    key={row.id}
                    className={`scenario-table-row ${selectedScenarioId === row.id ? 'active' : ''}`}
                    onClick={() => setSelectedScenarioId(row.id)}
                  >
                    <span style={{ color: row.status === 'failed' ? 'var(--fail)' : row.status === 'passed' ? 'var(--pass)' : 'var(--skip)', fontWeight: 700 }}>
                      {row.status === 'failed' ? '✕ Failed' : row.status === 'passed' ? '✓ Passed' : '− Skipped'}
                    </span>
                    <span style={{ color: 'var(--text)', fontWeight: 600 }}>{row.el.name}</span>
                    <span style={{ fontFamily: 'var(--mono)', color: 'var(--blue)' }}>{row.tag}</span>
                    <span style={{ fontFamily: 'var(--mono)' }}>{ns2s(row.durationNs)}</span>
                    <span style={{ color: 'var(--text3)', fontFamily: 'var(--mono)' }}>{(row.feature.uri || '').replace(/\\/g, '/').split('/').pop()}</span>
                  </div>
                ))}
              </div>

              {!selectedRow ? (
                <div className="dropzone" style={{ marginTop: 14, padding: '34px 24px', cursor: 'default' }}>
                  <div className="dtitle" style={{ fontSize: 20, marginBottom: 6 }}>Select a test to view details</div>
                  <div className="ddesc" style={{ marginBottom: 0 }}>Click any scenario row above to open AI analysis, step trace, media, and network diagnostics.</div>
                </div>
              ) : (
                <Feature feature={{ ...selectedRow.feature, elements: [selectedRow.el] }} filter="all" videoIndex={videoIndex} />
              )}

              {history.length > 0 && (
                <div style={{ marginTop: 40 }} className="afu">
                  <div className="secrow">
                    <span className="sectitle">Run History</span>
                    <button className="btn" style={{ fontSize: 12 }} onClick={() => loadRunHistory()}>🔄 Reload</button>
                  </div>
                  <div className="hgrid">
                    {history.map((e, idx) => <HistItem key={e.id} entry={e} moduleId={selectedBlock} isLatest={idx === 0} active={Number(e.id) === Number(activeId)} onClick={() => {
                      fetch(`./reports/runs/${e.id}/${selectedBlock}.json?t=` + Date.now(), { cache: 'no-store' })
                        .then(r => r.ok ? r.json() : null)
                        .then(data => {
                          const fs = data?.features || [];
                          if (fs.length) {
                            setFeatures(fs);
                            setFileName(`${selectedBlock}.json`);
                            setActiveId(e.id);
                            setRunMeta(e);
                          setSelectedScenarioId(null);
                            setFilter('all');
                            setLastLoadedAt(new Date(e.timestamp).getTime());
                          }
                        });
                    }} />)}
                  </div>
                </div>
              )}
            </>)}

            {routePage === 'module' && !features && history.length > 0 && (
              <div style={{ marginTop: 32 }}>
                <div className="secrow"><span className="sectitle">Previous Runs</span></div>
                <div className="hgrid">
                  {history.map((e, idx) => <HistItem key={e.id} entry={e} moduleId={selectedBlock} isLatest={idx === 0} active={false} onClick={() => {
                    fetch(`./reports/runs/${e.id}/${selectedBlock}.json?t=` + Date.now(), { cache: 'no-store' })
                      .then(r => r.ok ? r.json() : null)
                      .then(data => {
                        const fs = data?.features || [];
                        if (fs.length) {
                          setFeatures(fs);
                          setFileName(`${selectedBlock}.json`);
                          setActiveId(e.id);
                          setRunMeta(e);
                          setSelectedScenarioId(null);
                          setLastLoadedAt(new Date(e.timestamp).getTime());
                        }
                      });
                  }} />)}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
