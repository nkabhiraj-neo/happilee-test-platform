<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happilee QA — Test Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --green: #25D366;
      --green-d: #128C7E;
      --blue: #6366f1;
      --navy: #1e1b4b;
      --teal: #00C4B4;
      --pass: #16a34a;
      --pass-bg: #dcfce7;
      --pass-ring: #86efac;
      --fail: #dc2626;
      --fail-bg: #fee2e2;
      --fail-ring: #fca5a5;
      --skip: #d97706;
      --skip-bg: #fef3c7;
      --skip-ring: #fcd34d;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --bg: #f0f4f8;
      --surface: #fff;
      --surface2: #f8fafc;
      --border: rgba(0, 0, 0, 0.07);
      --border2: rgba(0, 0, 0, 0.13);
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.07), 0 8px 24px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1), 0 24px 64px rgba(0, 0, 0, 0.07);
      --r: 14px;
      --r-sm: 8px;
      --r-lg: 20px;
    }

    [data-theme="dark"] {
      --bg: #070d1a;
      --surface: #0f1829;
      --surface2: #152035;
      --border: rgba(255, 255, 255, 0.06);
      --border2: rgba(255, 255, 255, 0.11);
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #334155;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5), 0 24px 64px rgba(0, 0, 0, 0.4);
      --pass-bg: rgba(22, 163, 74, 0.12);
      --pass-ring: rgba(22, 163, 74, 0.3);
      --fail-bg: rgba(220, 38, 38, 0.12);
      --fail-ring: rgba(220, 38, 38, 0.3);
      --skip-bg: rgba(217, 119, 6, 0.12);
      --skip-ring: rgba(217, 119, 6, 0.3);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .4s, color .4s;
      -webkit-font-smoothing: antialiased;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0
      }

      100% {
        background-position: 200% 0
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-10px)
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.85)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes barGrow {
      from {
        transform: scaleX(0)
      }

      to {
        transform: scaleX(1)
      }
    }

    .afu {
      animation: fadeUp .5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .afu1 {
      animation: fadeUp .5s .07s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .afu2 {
      animation: fadeUp .5s .14s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .afu3 {
      animation: fadeUp .5s .21s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .afu4 {
      animation: fadeUp .5s .28s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .afu5 {
      animation: fadeUp .5s .35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .asi {
      animation: scaleIn .5s .3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* MESH */
    .mesh {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 15% 5%, rgba(22, 114, 204, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 85%, rgba(37, 211, 102, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 55% 45%, rgba(0, 196, 180, 0.04) 0%, transparent 55%);
      transition: all .5s;
    }

    [data-theme="dark"] .mesh {
      background: radial-gradient(ellipse 80% 60% at 15% 5%, rgba(22, 114, 204, 0.14) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 85%, rgba(37, 211, 102, 0.09) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 55% 45%, rgba(0, 196, 180, 0.07) 0%, transparent 55%);
    }

    /* TOP LINE */
    .topline {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 200;
      background: linear-gradient(90deg, var(--navy), var(--blue), var(--teal), var(--green), var(--teal), var(--blue), var(--navy));
      background-size: 300% 100%;
      animation: shimmer 5s linear infinite;
    }

    /* HEADER */
    .hdr {
      position: sticky;
      top: 3px;
      z-index: 100;
      min-height: 68px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.9), rgba(240, 249, 255, 0.92));
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      transition: background .4s, box-shadow .4s;
    }

    [data-theme="dark"] .hdr {
      background: linear-gradient(120deg, rgba(15, 24, 41, 0.94), rgba(8, 47, 73, 0.88));
      box-shadow: 0 12px 30px rgba(2, 6, 23, 0.6);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lmark {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #25D366, #128C7E);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      box-shadow: 0 2px 10px rgba(37, 211, 102, 0.35);
    }

    .lname {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .ltag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .hactions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--surface2);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .btnp {
      background: linear-gradient(135deg, var(--blue), var(--navy));
      color: white;
      border-color: transparent;
      box-shadow: 0 2px 10px rgba(22, 114, 204, 0.3);
    }

    .btnp:hover {
      box-shadow: 0 4px 18px rgba(22, 114, 204, 0.48);
      transform: translateY(-1px);
    }

    .btni {
      width: 36px;
      height: 36px;
      padding: 0;
      justify-content: center;
      font-size: 16px;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .livepill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 13px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border2);
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      font-family: var(--mono);
    }

    .ldot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--pass);
      box-shadow: 0 0 0 2px var(--pass-ring);
      animation: pulse 2s ease-in-out infinite;
    }

    /* MAIN */
    .main {
      position: relative;
      z-index: 1;
      max-width: 1320px;
      margin: 0 auto;
      padding: 28px 32px 80px;
    }

    /* HERO GRID */
    .hero {
      display: grid;
      grid-template-columns: 1fr 210px;
      gap: 18px;
      margin-bottom: 20px;
      align-items: stretch;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .mcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      cursor: default;
    }

    .mcard:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .mcard::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 0 0 var(--r) var(--r);
    }

    .mcard.mc-tot::after {
      background: linear-gradient(90deg, var(--blue), var(--teal));
    }

    .mcard.mc-pas::after {
      background: var(--pass);
    }

    .mcard.mc-fai::after {
      background: var(--fail);
    }

    .mcard.mc-dur::after {
      background: var(--skip);
    }

    .mglyph {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .mcard.mc-tot .mglyph {
      background: rgba(22, 114, 204, 0.1);
    }

    .mcard.mc-pas .mglyph {
      background: var(--pass-bg);
    }

    .mcard.mc-fai .mglyph {
      background: var(--fail-bg);
    }

    .mcard.mc-dur .mglyph {
      background: var(--skip-bg);
    }

    .mlabel {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px;
    }

    .mval {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    .mcard.mc-tot .mval {
      color: var(--blue);
    }

    .mcard.mc-pas .mval {
      color: var(--pass);
    }

    .mcard.mc-fai .mval {
      color: var(--fail);
    }

    .mcard.mc-dur .mval {
      font-size: 22px;
      letter-spacing: -0.5px;
      color: var(--skip);
    }

    .msub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
      font-family: var(--mono);
    }

    /* DONUT */
    .donut-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .donut-wrap {
      position: relative;
      width: 128px;
      height: 128px;
    }

    .donut-svg {
      transform: rotate(-90deg);
    }

    .donut-ctr {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .dpct {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .dsub {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .dleg {
      display: flex;
      flex-direction: column;
      gap: 7px;
      width: 100%;
    }

    .dleg-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text2);
    }

    .dlegdot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* PROGRESS STRIP */
    .pstrip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .pstrip-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .plabel {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .prate {
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
    }

    .ptrack {
      height: 8px;
      background: var(--surface2);
      border-radius: 4px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      gap: 2px;
    }

    .pseg {
      height: 100%;
      transform-origin: left;
      animation: barGrow .7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .pseg:nth-child(1) {
      animation-delay: .1s;
    }

    .pseg:nth-child(2) {
      animation-delay: .2s;
    }

    .pseg:nth-child(3) {
      animation-delay: .3s;
    }

    .pseg.ps {
      background: var(--pass);
    }

    .pseg.pf {
      background: var(--fail);
    }

    .pseg.pk {
      background: var(--skip);
    }

    .pseg:first-child {
      border-radius: 4px 0 0 4px;
    }

    .pseg:last-child {
      border-radius: 0 4px 4px 0;
    }

    /* META ROW */
    .metarow {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 20px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      box-shadow: var(--shadow-sm);
      overflow-x: auto;
      flex-wrap: wrap;
      gap: 0;
    }

    .mi {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 20px;
      border-right: 1px solid var(--border);
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .mi:first-child {
      padding-left: 0;
    }

    .mi:last-child {
      border-right: none;
    }

    .miv {
      font-weight: 600;
      color: var(--text);
    }

    /* SECTION */
    .secrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .sectitle {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .fgrp {
      display: flex;
      gap: 6px;
    }

    .welcome-card {
      background: linear-gradient(135deg, #eef2ff, #ffffff 40%, #f5f3ff);
      border: 1px solid #c7d2fe;
      border-radius: var(--r);
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
    }

    [data-theme="dark"] .welcome-card {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.16), rgba(15, 23, 42, 0.5));
      border-color: rgba(129, 140, 248, 0.45);
    }

    .welcome-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .welcome-sub {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
    }

    .module-spotlight {
      margin-bottom: 14px;
      padding: 16px 18px;
      border-radius: var(--r);
      border: 1px solid rgba(99, 102, 241, 0.42);
      background: linear-gradient(130deg, rgba(99, 102, 241, 0.18), rgba(255, 255, 255, 0.9) 44%, rgba(56, 189, 248, 0.12));
      box-shadow: 0 10px 24px rgba(99, 102, 241, 0.16);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    [data-theme="dark"] .module-spotlight {
      background: linear-gradient(140deg, rgba(99, 102, 241, 0.25), rgba(15, 23, 42, 0.9) 60%);
      border-color: rgba(129, 140, 248, 0.5);
    }

    .spot-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .spot-sub {
      font-size: 12px;
      color: var(--text2);
      margin-top: 3px;
    }

    .incident-strip {
      margin: 8px 0 10px;
      border: 1px solid #fca5a5;
      background: #fff1f2;
      border-radius: 8px;
      padding: 8px 10px;
    }

    .incident-head {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #b91c1c;
      margin-bottom: 3px;
    }

    .scenario-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: 14px;
    }

    .scenario-table-head,
    .scenario-table-row {
      display: grid;
      grid-template-columns: 100px 1.8fr 90px 90px 1.2fr;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
    }

    .scenario-table-head {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text3);
    }

    .scenario-table-row {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
      font-size: 12px;
      color: var(--text2);
    }

    .scenario-table-row:last-child {
      border-bottom: none;
    }

    .scenario-table-row:hover {
      background: var(--surface2);
    }

    .scenario-table-row.active {
      background: rgba(99, 102, 241, 0.1);
      border-left: 3px solid #6366f1;
      padding-left: 11px;
    }

    .fchip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }

    .fchip:hover {
      background: var(--surface2);
    }

    .fchip.ac {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
    }

    .fchip.ac.fp {
      background: var(--pass);
      border-color: var(--pass);
    }

    .fchip.ac.ff {
      background: var(--fail);
      border-color: var(--fail);
    }

    .fchip.ac.fk {
      background: var(--skip);
      border-color: var(--skip);
    }

    /* FEATURE */
    .fblock {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s;
    }

    .fblock:hover {
      box-shadow: var(--shadow);
    }

    .fbar {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .ficon {
      font-size: 15px;
    }

    .fname {
      font-size: 14px;
      font-weight: 700;
      flex: 1;
    }

    .furi {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      background: var(--bg);
      padding: 3px 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .fcnt {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
    }

    /* SCENARIO */
    .swrap {
      border-bottom: 1px solid var(--border);
    }

    .swrap:last-child {
      border-bottom: none;
    }

    .srow {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background .15s;
      user-select: none;
    }

    .srow:hover {
      background: var(--surface2);
    }

    .sbadge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: var(--mono);
      flex-shrink: 0;
    }

    .sbadge.passed {
      background: var(--pass-bg);
      color: var(--pass);
    }

    .sbadge.failed {
      background: var(--fail-bg);
      color: var(--fail);
    }

    .sbadge.skipped {
      background: var(--skip-bg);
      color: var(--skip);
    }

    .sdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .sname {
      flex: 1;
      font-size: 13.5px;
      font-weight: 600;
    }

    .stags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--mono);
      background: var(--surface2);
      color: var(--text3);
      border: 1px solid var(--border);
    }

    .tag.req {
      background: rgba(22, 114, 204, 0.1);
      color: var(--blue);
      border-color: rgba(22, 114, 204, 0.2);
    }

    .tag.reg {
      background: rgba(124, 58, 237, 0.1);
      color: #7c3aed;
      border-color: rgba(124, 58, 237, 0.2);
    }

    .tag.smk {
      background: rgba(37, 211, 102, 0.1);
      color: var(--green-d);
      border-color: rgba(37, 211, 102, 0.2);
    }

    .tag.prj {
      background: rgba(0, 196, 180, 0.1);
      color: #0F7A72;
      border-color: rgba(0, 196, 180, 0.2);
    }

    .sdur {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text3);
      flex-shrink: 0;
    }

    .chev {
      font-size: 14px;
      color: var(--text3);
      transition: transform .25s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
    }

    .chev.op {
      transform: rotate(180deg);
    }

    .step-count {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .sc-p {
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--mono);
      background: var(--pass-bg);
      color: var(--pass);
    }

    .sc-f {
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--mono);
      background: var(--fail-bg);
      color: var(--fail);
    }

    .sc-s {
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--mono);
      background: var(--skip-bg);
      color: var(--skip);
    }

    /* STEPS PANEL */
    .spanel {
      background: var(--surface2);
      border-top: 1px solid var(--border);
      padding: 0 20px 16px;
      animation: slideDown .22s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .sphdr {
      padding: 12px 0 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .steprow {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeUp .15s ease both;
    }

    .steprow:last-child {
      border-bottom: none;
    }

    .stepdot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .stepdot.passed {
      background: var(--pass-bg);
      color: var(--pass);
      border: 1px solid var(--pass-ring);
    }

    .stepdot.failed {
      background: var(--fail-bg);
      color: var(--fail);
      border: 1px solid var(--fail-ring);
    }

    .stepdot.skipped {
      background: var(--skip-bg);
      color: var(--skip);
      border: 1px solid var(--skip-ring);
    }

    .stcont {
      flex: 1;
      min-width: 0;
    }

    .sttxt {
      font-size: 13px;
      line-height: 1.5;
    }

    .stkw {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--blue);
      margin-right: 4px;
    }

    [data-theme="dark"] .stkw {
      color: var(--teal);
    }

    .sttime {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      flex-shrink: 0;
      padding-top: 3px;
      min-width: 52px;
      text-align: right;
    }

    /* ERROR */
    .errblk {
      margin-top: 10px;
      border: 1px solid var(--fail-ring);
      border-left: 3px solid var(--fail);
      border-radius: var(--r-sm);
      background: var(--fail-bg);
      overflow: hidden;
    }

    .errhdr {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 7px;
      border-bottom: 1px solid var(--fail-ring);
    }

    .errtxt {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--fail);
    }

    .errbody {
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--fail);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 220px;
      overflow-y: auto;
      background: rgba(220, 38, 38, 0.04);
    }

    [data-theme="dark"] .errbody {
      color: #fca5a5;
    }

    /* ATTACH */
    .atxtlbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
      margin: 8px 0 5px;
    }

    .atxt {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--text2);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* SCREENSHOT */
    .sswrap {
      margin-top: 10px;
      border-radius: var(--r-sm);
      overflow: hidden;
      border: 1px solid var(--fail-ring);
      box-shadow: 0 4px 16px rgba(220, 38, 38, 0.15);
    }

    .sshdr {
      padding: 8px 12px;
      background: var(--fail-bg);
      border-bottom: 1px solid var(--fail-ring);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sshtxt {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--fail);
    }

    .ssimg {
      width: 100%;
      display: block;
      max-height: 520px;
      object-fit: contain;
      background: #000;
    }

    /* HISTORY */
    .hgrid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hitem {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 13px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all .15s;
      box-shadow: var(--shadow-sm);
    }

    .hitem:hover {
      transform: translateX(4px);
      box-shadow: var(--shadow);
      border-color: var(--border2);
    }

    .hitem.ac {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(22, 114, 204, 0.15);
    }

    .hnum {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      min-width: 44px;
    }

    .hdot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .hdot.passed {
      background: var(--pass);
    }

    .hdot.failed {
      background: var(--fail);
    }

    .hname {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hpills {
      display: flex;
      gap: 5px;
    }

    .hpill {
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 5px;
    }

    .hpill.hp {
      background: var(--pass-bg);
      color: var(--pass);
    }

    .hpill.hf {
      background: var(--fail-bg);
      color: var(--fail);
    }

    .hpill.hk {
      background: var(--skip-bg);
      color: var(--skip);
    }

    .htime {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
      white-space: nowrap;
    }

    /* DROP */
    .dropzone {
      margin: 48px auto;
      max-width: 600px;
      border: 2px dashed var(--border2);
      border-radius: 24px;
      padding: 64px 40px;
      text-align: center;
      cursor: pointer;
      background: linear-gradient(135deg, var(--surface), var(--surface2));
      transition: all .3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .dropzone:hover,
    .dropzone.dg {
      border-color: var(--blue);
      background: rgba(22, 114, 204, 0.04);
      transform: scale(1.015);
    }

    [data-theme="dark"] .dropzone:hover,
    [data-theme="dark"] .dropzone.dg {
      border-color: var(--green);
      background: rgba(37, 211, 102, 0.04);
    }

    .dorb {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--navy));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 22px;
      box-shadow: 0 8px 28px rgba(22, 114, 204, 0.32);
      animation: orbFloat 3.5s ease-in-out infinite;
    }

    .dtitle {
      font-size: 25px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .ddesc {
      font-size: 15px;
      color: var(--text2);
      margin-bottom: 26px;
      line-height: 1.6;
    }

    .ddesc code {
      font-family: var(--mono);
      font-size: 13px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      padding: 2px 8px;
      border-radius: 5px;
      color: var(--blue);
    }

    .dbtn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--blue), var(--navy));
      color: white;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(22, 114, 204, 0.4);
      transition: all .2s;
    }

    .dbtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(22, 114, 204, 0.52);
    }

    .dhint {
      margin-top: 18px;
      font-size: 12px;
      color: var(--text3);
      font-family: var(--mono);
    }

    .evidence-section {
      margin-top: 16px;
      border-top: 2px solid var(--fail-ring);
      padding-top: 14px;
    }

    .evidence-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--fail);
      margin-bottom: 12px;
    }

    .video-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .mcard.flash {
      animation: cardFlash 0.6s ease;
    }

    @keyframes cardFlash {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.7;
        box-shadow: 0 0 0 4px rgba(22, 114, 204, 0.2);
      }
    }

    .notif-banner {
      padding: 12px 20px;
      margin-bottom: 16px;
      border-radius: var(--r);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideDown .3s ease;
    }

    .notif-banner.fail {
      background: var(--fail-bg);
      border: 2px solid var(--fail);
      color: var(--fail);
    }

    .notif-banner.pass {
      background: var(--pass-bg);
      border: 2px solid var(--pass);
      color: var(--pass);
    }

    .block-select {
      padding: 6px 12px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      min-width: 180px;
    }

    .live-btn {
      padding: 6px 14px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border2);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }

    .live-btn.off {
      background: var(--surface);
      color: var(--text2);
    }

    .live-btn.on {
      background: var(--pass-bg);
      color: var(--pass);
      border-color: var(--pass);
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    @media(max-width:1000px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }

      .main {
        padding: 20px 16px 60px;
      }

      .hdr {
        padding: 0 16px;
      }
    }

    @media(max-width:600px) {
      .metrics {
        grid-template-columns: 1fr 1fr;
      }

      .sttime {
        display: none;
      }

      .sname {
        font-size: 12.5px;
      }
    }

    /* LIVE MONITOR */
    .live-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .live-panel-header {
      padding: 14px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-state-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .live-state-badge.running {
      background: rgba(22, 114, 204, 0.12);
      color: var(--blue);
    }

    .live-state-badge.completed {
      background: var(--pass-bg);
      color: var(--pass);
    }

    .live-state-badge.idle {
      background: var(--surface2);
      color: var(--text3);
    }

    .live-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse 1s ease-in-out infinite;
      flex-shrink: 0;
    }

    .live-scenario-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .live-body {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 0;
    }

    .live-steps-col {
      padding: 16px 20px;
      border-right: 1px solid var(--border);
    }

    .live-right-col {
      padding: 16px 20px;
    }

    .live-step-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: var(--r-sm);
      margin-bottom: 3px;
      transition: background 0.2s;
      position: relative;
      flex-wrap: wrap;
    }

    .live-step-row.running {
      background: rgba(22, 114, 204, 0.07);
      border: 1px solid rgba(22, 114, 204, 0.15);
    }

    .live-step-row.passed {
      background: transparent;
    }

    .live-step-row.failed {
      background: var(--fail-bg);
      border: 1px solid var(--fail-ring);
    }

    .live-step-row.pending {
      opacity: 0.45;
    }

    .live-step-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .live-step-icon.passed {
      background: var(--pass-bg);
      color: var(--pass);
      border: 1px solid var(--pass-ring);
    }

    .live-step-icon.failed {
      background: var(--fail-bg);
      color: var(--fail);
      border: 1px solid var(--fail-ring);
    }

    .live-step-icon.running {
      background: rgba(22, 114, 204, 0.1);
      color: var(--blue);
      border: 1px solid rgba(22, 114, 204, 0.3);
    }

    .live-step-icon.skipped {
      background: var(--skip-bg);
      color: var(--skip);
      border: 1px solid var(--skip-ring);
    }

    .live-step-icon.pending {
      background: var(--surface2);
      color: var(--text3);
      border: 1px solid var(--border);
    }

    .live-step-kw {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--blue);
      flex-shrink: 0;
      min-width: 44px;
    }

    [data-theme="dark"] .live-step-kw {
      color: var(--teal);
    }

    .live-step-name {
      font-size: 12.5px;
      color: var(--text);
      flex: 1;
    }

    .live-step-row.running .live-step-name {
      color: var(--blue);
      font-weight: 600;
    }

    .live-step-dur {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      flex-shrink: 0;
    }

    .live-running-indicator {
      display: flex;
      gap: 3px;
      align-items: center;
      flex-shrink: 0;
    }

    .live-running-indicator span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--blue);
      animation: bounce 1.2s ease infinite;
    }

    .live-running-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .live-running-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-4px);
      }
    }

    .live-progress-wrap {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .live-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 6px;
      font-family: var(--mono);
    }

    .live-progress-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
    }

    .live-progress-pass {
      height: 100%;
      background: var(--pass);
      transition: width 0.4s ease;
    }

    .live-progress-fail {
      height: 100%;
      background: var(--fail);
      transition: width 0.4s ease;
    }

    .live-current-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
      margin-bottom: 14px;
    }

    .live-current-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .live-current-step {
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      line-height: 1.5;
    }

    .live-current-elapsed {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      margin-top: 6px;
    }

    .live-counters {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .live-counter {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px;
      text-align: center;
    }

    .live-counter-val {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .live-counter-val.p {
      color: var(--pass);
    }

    .live-counter-val.f {
      color: var(--fail);
    }

    .live-counter-val.s {
      color: var(--skip);
    }

    .live-counter-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text3);
    }

    .live-idle-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text3);
    }

    .live-idle-icon {
      font-size: 40px;
      margin-bottom: 14px;
      display: block;
    }

    .live-idle-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .live-idle-sub {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text3);
    }

    .live-error-box {
      margin-top: 10px;
      background: var(--fail-bg);
      border: 1px solid var(--fail-ring);
      border-left: 3px solid var(--fail);
      border-radius: var(--r-sm);
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fail);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 100px;
      overflow-y: auto;
    }

    @media(max-width:800px) {
      .live-body {
        grid-template-columns: 1fr;
      }

      .live-steps-col {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const ns2s = ns => { if (!ns) return '0.00s'; const s = ns / 1e9; if (s >= 60) return `${Math.floor(s / 60)}m ${(s % 60).toFixed(1)}s`; return `${s.toFixed(2)}s`; };
    const ns2ms = ns => { if (!ns) return '0ms'; const ms = ns / 1e6; return ms >= 1000 ? `${(ms / 1000).toFixed(2)}s` : `${ms.toFixed(0)}ms`; };
    const totalNs = fs => fs.flatMap(f => f.elements || []).flatMap(e => e.steps || []).reduce((a, s) => a + (s.result?.duration || 0), 0);
    const scenSt = el => { const st = (el.steps || []).filter(s => !s.hidden); if (st.some(s => s.result?.status === 'failed')) return 'failed'; if (st.every(s => s.result?.status === 'skipped')) return 'skipped'; return 'passed'; };
    const stats = fs => { const allScenarios = (fs || []).flatMap(ft => ft.elements || []); let p = 0, f = 0, sk = 0; allScenarios.forEach(el => { const status = scenSt(el); if (status === 'passed') p++; else if (status === 'failed') f++; else if (status === 'skipped') sk++; }); return { passed: p, failed: f, skipped: sk, total: allScenarios.length }; };
    const b64t = s => { try { return atob(s); } catch { return s; } };
    const fmtD = ts => new Date(ts).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
    const shortRunId = id => `#${String(id).slice(-4)}`;
    const fmtRunDate = ts => new Date(ts).toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
    const fmtRunDateShort = ts => new Date(ts).toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: true });
    const runLabel = (entry, moduleId) => `Run ${shortRunId(entry.id)} • ${fmtRunDateShort(entry.timestamp)} • ${(MODULE_META[moduleId]?.technical || moduleId)} • ${entry.passedScenarios || 0}✓ ${entry.failedScenarios || 0}✗`;
    const normalizePath = raw => String(raw || '').replace(/^.*codebase[\\\/]/, 'codebase/').replace(/\\/g, '/');
    const tclass = t => { const v = t.toLowerCase(); if (/@[a-z]+-\d+/.test(v) || /@prj|@mlr/.test(v)) return 'req'; if (v === '@regression') return 'reg'; if (v === '@smoke') return 'smk'; if (v.startsWith('@project') || v.startsWith('@auth')) return 'prj'; return ''; };

    const MODULE_META = {
      _hap_fe_auth: { label: 'Auth', technical: '_hap_fe_auth' },
      _hap_fe_project: { label: 'Project', technical: '_hap_fe_project' }
    };
    const BLOCKS = [{ id: '_hap_fe_project', label: MODULE_META._hap_fe_project.label, url: './reports/_hap_fe_project.json' }, { id: '_hap_fe_auth', label: MODULE_META._hap_fe_auth.label, url: './reports/_hap_fe_auth.json' }];
    const ROUTE_TO_BLOCK = { projects: '_hap_fe_project', project: '_hap_fe_project', auth: '_hap_fe_auth' };
    const BLOCK_TO_ROUTE = { _hap_fe_project: 'projects', _hap_fe_auth: 'auth' };
    const readRoute = () => {
      const raw = String(window.location.hash || '#/dashboard').replace(/^#\/?/, '').trim().toLowerCase();
      if (!raw || raw === 'dashboard') return { page: 'dashboard', blockId: null };
      return { page: 'module', blockId: ROUTE_TO_BLOCK[raw] || null };
    };
    const writeRoute = (next) => {
      const path = String(next || '').replace(/^\/+/, '');
      const wanted = `#/${path || 'dashboard'}`;
      if (window.location.hash !== wanted) window.location.hash = wanted;
    };

    function Donut({ passed, failed, skipped, total }) {
      const R = 44, C = 276.5;
      const pPct = total ? passed / total : 0, fPct = total ? failed / total : 0, sPct = total ? skipped / total : 0;
      const pD = C * pPct, fD = C * fPct, sD = C * sPct;
      const pct = total ? Math.round((passed / total) * 100) : 0;
      return (
        <div className="donut-card afu4">
          <div className="donut-wrap">
            <svg className="donut-svg" width="128" height="128" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r={R} fill="none" stroke="var(--surface2)" strokeWidth="10" />
              {skipped > 0 && <circle cx="50" cy="50" r={R} fill="none" stroke="var(--skip)" strokeWidth="10" strokeDasharray={`${sD} ${C}`} strokeDashoffset={-(pD + fD)} strokeLinecap="round" />}
              {failed > 0 && <circle cx="50" cy="50" r={R} fill="none" stroke="var(--fail)" strokeWidth="10" strokeDasharray={`${fD} ${C}`} strokeDashoffset={-pD} strokeLinecap="round" />}
              {passed > 0 && <circle cx="50" cy="50" r={R} fill="none" stroke="var(--pass)" strokeWidth="10" strokeDasharray={`${pD} ${C}`} strokeDashoffset="0" strokeLinecap="round" />}
            </svg>
            <div className="donut-ctr">
              <div className="dpct asi" style={{ color: failed > 0 ? 'var(--fail)' : 'var(--pass)' }}>{pct}%</div>
              <div className="dsub">pass rate</div>
            </div>
          </div>
          <div className="dleg">
            {[['var(--pass)', 'Passed', passed], ['var(--fail)', 'Failed', failed], ['var(--skip)', 'Skipped', skipped]].map(([c, l, v]) => (
              <div key={l} className="dleg-row"><span className="dlegdot" style={{ background: c }} /><span style={{ flex: 1 }}>{l}</span><span style={{ fontWeight: 700, color: 'var(--text)' }}>{v}</span></div>
            ))}
          </div>
        </div>
      );
    }

    function Step({ step, idx, el }) {
      if (step.hidden) return null;
      const st = step.result?.status || 'skipped';
      const icon = st === 'passed' ? '✓' : st === 'failed' ? '✕' : '–';
      const stackPaths = st === 'failed' && step.result?.error_message
        ? step.result.error_message
          .split('\n')
          .filter(line => line.includes('codebase'))
          .map(line => normalizePath(line.trim()))
          .slice(0, 4)
        : [];
      
      const embs = step.embeddings || [];
      return (
        <div className="steprow" style={{ animationDelay: `${idx * 0.03}s` }}>
          <div className={`stepdot ${st}`}>{icon}</div>
          <div className="stcont">
            <div className="sttxt"><span className="stkw">{step.keyword}</span>{step.name}</div>
            
            {step.result?.error_message && (
              <div>
                {/* If AI analysis exists show clean version */}
                {el.aiAnalysis ? (
                  <div style={{
                    padding: '12px',
                    background: '#fef2f2',
                    border: '1px solid #fecaca',
                    borderRadius: '8px',
                    marginTop: '8px'
                  }}>
                    <div style={{
                      fontWeight: 600,
                      color: '#dc2626',
                      marginBottom: '6px',
                      fontSize: '13px'
                    }}>
                      ⚠️ {el.aiAnalysis.headline}
                    </div>
                    <div style={{
                      color: '#7f1d1d',
                      fontSize: '13px',
                      lineHeight: '1.6',
                      marginBottom: '10px'
                    }}>
                      {el.aiAnalysis.what_happened}
                    </div>
                    <details>
                      <summary style={{
                        fontSize: '11px',
                        color: '#dc2626',
                        cursor: 'pointer'
                      }}>
                        Show technical details
                      </summary>
                      {stackPaths.length > 0 && (
                        <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap', marginTop: '8px' }}>
                          {stackPaths.map((p, pi) => (
                            <span key={pi} style={{
                              fontFamily: 'var(--mono)',
                              fontSize: '10px',
                              background: '#e2e8f0',
                              color: '#334155',
                              borderRadius: '4px',
                              padding: '3px 6px'
                            }}>{p}</span>
                          ))}
                        </div>
                      )}
                      <pre style={{
                        fontSize: '11px',
                        color: '#7f1d1d',
                        marginTop: '8px',
                        whiteSpace: 'pre-wrap',
                        wordBreak: 'break-word',
                        background: '#fff',
                        padding: '8px',
                        borderRadius: '4px'
                      }}>
                        {step.result.error_message}
                      </pre>
                    </details>
                  </div>
                ) : (
                  /* No AI analysis yet — show raw but formatted */
                  <div style={{
                    padding: '12px',
                    background: '#fef2f2',
                    border: '1px solid #fecaca',
                    borderRadius: '8px',
                    marginTop: '8px'
                  }}>
                    <div style={{
                      fontWeight: 600,
                      color: '#dc2626',
                      marginBottom: '6px',
                      fontSize: '12px'
                    }}>
                      ⚠️ ERROR DETAILS
                    </div>
                    <pre style={{
                      fontSize: '11px',
                      color: '#7f1d1d',
                      whiteSpace: 'pre-wrap',
                      wordBreak: 'break-word',
                      margin: 0
                    }}>
                      {step.result.error_message}
                    </pre>
                  </div>
                )}
              </div>
            )}

            {(step.embeddings || [])
              .filter(e => e.mime_type?.startsWith('image/'))
              .map((emb, i) => (
                <img key={i}
                  src={`data:${emb.mime_type};base64,${emb.data}`}
                  style={{
                    display: 'block',
                    maxWidth: '100%',
                    margin: '8px 0 12px 44px',
                    borderRadius: '8px',
                    border: '1px solid #e2e8f0',
                    boxShadow: '0 2px 8px rgba(0,0,0,0.12)',
                    cursor: 'pointer'
                  }}
                  onClick={() => window.open(`data:${emb.mime_type};base64,${emb.data}`)}
                  alt="step screenshot"
                />
              ))
            }
            {embs.filter(e => e.mime_type === 'text/plain').map((emb, i) => (
              <div key={i}><div className="atxtlbl">📎 Attachment</div><pre className="atxt">{b64t(emb.data)}</pre></div>
            ))}
          </div>
          <div className="sttime">{ns2ms(step.result?.duration)}</div>
        </div>
      );
    }

    function Scenario({ el, autoOpen, videoIndex = {}, featureUri = '' }) {
      const [open, setOpen] = useState(autoOpen || false);
      const st = scenSt(el);
      const tags = (el.tags || []).map(t => t.name);
      const visibleSteps = (el.steps || []).filter(s => !s.hidden);
      const steps = visibleSteps;
      const stepsPassed = visibleSteps.filter(s => s.result?.status === 'passed').length;
      const stepsFailed = visibleSteps.filter(s => s.result?.status === 'failed').length;
      const stepsSkipped = visibleSteps.filter(s => s.result?.status === 'skipped').length;
      const dur = steps.reduce((a, s) => a + (s.result?.duration || 0), 0);
      const hasRealBug = el.aiAnalysis?.type === 'REAL_BUG';

      // Collect all scenario-level screenshots from before/after hooks
      const scenarioScreenshots = [
        ...(el.before || []),
        ...(el.after || [])
      ].flatMap(hook => hook.embeddings || [])
        .filter(e => e.mime_type?.startsWith('image/'));

      // Extract the MLR number from scenario tags (STRICT MATCHING)
      const scenarioTag = (el.tags || [])
        .map(t => t.name.replace('@', ''))
        .find(t => t.startsWith('MLR-'));

      // Find videos for this scenario from the index object
      const scenarioVideos = scenarioTag ? (videoIndex[scenarioTag] || null) : null;
      const networkEmb = [...(el.before || []), ...(el.after || []), ...(el.steps || [])]
        .flatMap(h => h.embeddings || [])
        .find(e => e.mime_type === 'application/json');
      let networkData = el.networkFailures?.length ? { failed_requests: el.networkFailures } : null;
      if (!networkData) {
        try {
          networkData = networkEmb ? JSON.parse(atob(networkEmb.data)) : null;
        } catch {
          networkData = null;
        }
      }
      const criticalNetworkFailure = (networkData?.failed_requests || [])
        .find(r => (r.status || 0) >= 500) || (networkData?.failed_requests || [])
        .find(r => (r.status || 0) >= 400) || null;
      const hasNetworkFailure = (networkData?.failed_requests || []).length > 0;
      const requests = networkData?.failed_requests || [];
      const isFirstParty = (url) => /happilee\.io/i.test(String(url || ''));
      const critical = requests.filter(r => (r.status || 0) >= 400).sort((a, b) => (b.status || 0) - (a.status || 0));
      const prioritized = critical.filter(r => (r.status || 0) >= 500 || isFirstParty(r.url));
      const preview = (prioritized.length ? prioritized : critical).slice(0, 2);
      const noisy = critical.filter(r => !isFirstParty(r.url));
      const failureMessage = (() => {
        if (!criticalNetworkFailure?.responseBody || criticalNetworkFailure.responseBody === 'Could not read response') return null;
        try {
          const parsed = JSON.parse(criticalNetworkFailure.responseBody);
          return parsed?.message || parsed?.error || JSON.stringify(parsed).slice(0, 220);
        } catch {
          return String(criticalNetworkFailure.responseBody).slice(0, 220);
        }
      })();

      return (
        <div className="swrap">
          <div className="srow" onClick={() => setOpen(o => !o)}>
            <div className={`sbadge ${st}`}><span className="sdot" />{st}</div>
            <div className="sname">{el.name}</div>
            {hasRealBug && <span title="AI detected REAL_BUG" style={{ fontSize: '13px' }}>🐛</span>}
            {hasNetworkFailure && <span title="Network failures captured" style={{ fontSize: '13px' }}>🌐</span>}
            <div className="step-count">
              <span className="sc-p">✓ {stepsPassed}</span>
              {stepsFailed > 0 && <span className="sc-f">✕ {stepsFailed}</span>}
              {stepsSkipped > 0 && <span className="sc-s">– {stepsSkipped}</span>}
            </div>
            <div className="stags">{tags.map(t => <span key={t} className={`tag ${tclass(t)}`}>{t}</span>)}</div>
            <div className="sdur">{ns2s(dur)}</div>
            <div className={`chev ${open ? 'op' : ''}`}>▾</div>
          </div>
          {open && <div className="spanel">
            <div style={{
              margin: '0 0 10px 0',
              fontSize: '11px',
              fontFamily: 'var(--mono)',
              color: 'var(--text3)',
              padding: '8px 10px',
              background: 'var(--surface)',
              borderRadius: '6px',
              border: '1px solid var(--border)'
            }}>
              {['happilee-test-platform', ...String(featureUri || '').replace(/\\/g, '/').split('/').filter(Boolean)]
                .map((part, idx, arr) => (
                  <span key={idx} style={{ fontWeight: idx === arr.length - 1 ? 700 : 500 }}>
                    {part}{idx < arr.length - 1 ? ' / ' : ''}
                  </span>
                ))}
            </div>

            {(criticalNetworkFailure || hasNetworkFailure) && (
              <div className="incident-strip">
                <div className="incident-head">Network Incident Summary</div>
                {criticalNetworkFailure ? (
                  <div style={{ fontSize: '13px', color: '#7f1d1d', lineHeight: 1.45 }}>
                    <strong>{criticalNetworkFailure.method} {criticalNetworkFailure.status}</strong> {String(criticalNetworkFailure.url || '').slice(0, 130)}
                    {failureMessage && <div style={{ marginTop: 4 }}>Response: <code>{failureMessage}</code></div>}
                  </div>
                ) : (
                  <div style={{ fontSize: '13px', color: '#7f1d1d' }}>Network failures captured: {requests.length}</div>
                )}
                <div style={{ marginTop: 8, display: 'flex', gap: 8, flexWrap: 'wrap', fontSize: 11 }}>
                  <span style={{ color: '#475569', background: '#f1f5f9', padding: '3px 8px', borderRadius: 999 }}>Total: {requests.length}</span>
                  <span style={{ color: '#b91c1c', background: '#fee2e2', padding: '3px 8px', borderRadius: 999 }}>5xx: {requests.filter(r => (r.status || 0) >= 500).length}</span>
                  <span style={{ color: '#b45309', background: '#fef3c7', padding: '3px 8px', borderRadius: 999 }}>4xx: {requests.filter(r => (r.status || 0) >= 400 && (r.status || 0) < 500).length}</span>
                  <span style={{ color: '#64748b', background: '#e2e8f0', padding: '3px 8px', borderRadius: 999 }}>Third-party noisy: {noisy.length}</span>
                </div>
                {preview.length > 0 && (
                  <details style={{ marginTop: 8 }}>
                    <summary style={{ cursor: 'pointer', fontSize: 12, fontWeight: 700, color: '#334155' }}>Show top critical failures</summary>
                    <div style={{ marginTop: 6 }}>
                      {preview.map((req, i) => (
                        <div key={i} style={{ padding: '5px 0', borderBottom: '1px solid #f1f5f9', fontSize: 11, display: 'flex', gap: 7, alignItems: 'center' }}>
                          <span style={{ minWidth: 44, textAlign: 'center', padding: '2px 6px', borderRadius: 4, background: (req.status || 0) >= 500 ? '#dc2626' : '#d97706', color: '#fff', fontWeight: 700 }}>{req.status || 'ERR'}</span>
                          <span style={{ minWidth: 45, fontWeight: 700, color: '#334155' }}>{req.method}</span>
                          <span style={{ color: '#475569', wordBreak: 'break-all' }}>{String(req.url || '').slice(0, 120)}{String(req.url || '').length > 120 ? '...' : ''}</span>
                        </div>
                      ))}
                    </div>
                  </details>
                )}
              </div>
            )}

            {/* AI Failure Analysis panel — always before steps */}
            {el.aiAnalysis && (
              <div style={{
                margin: '16px 0',
                borderRadius: '10px',
                border: '1px solid #e2e8f0',
                overflow: 'hidden'
              }}>
                {/* Header bar — color based on type */}
                <div style={{
                  padding: '10px 16px',
                  background: el.aiAnalysis.type === 'REAL_BUG' ? '#fef2f2'
                    : el.aiAnalysis.type === 'ENVIRONMENT_ISSUE' ? '#fffbeb'
                    : '#eff6ff',
                  borderBottom: '1px solid #e2e8f0',
                  display: 'flex', alignItems: 'center', gap: '10px', flexWrap: 'wrap'
                }}>
                  <span style={{fontSize:'16px'}}>🤖</span>
                  <strong style={{fontSize:'14px'}}>AI Failure Analysis</strong>
                  <span style={{
                    padding: '2px 10px', borderRadius: '999px',
                    fontSize: '11px', fontWeight: 700,
                    background: el.aiAnalysis.type === 'REAL_BUG' ? '#dc2626'
                      : el.aiAnalysis.type === 'ENVIRONMENT_ISSUE' ? '#d97706'
                      : '#2563eb',
                    color: '#fff'
                  }}>{el.aiAnalysis.type?.replace(/_/g,' ')}</span>
                  <span style={{
                    padding: '2px 10px', borderRadius: '999px',
                    fontSize: '11px', fontWeight: 600,
                    background: '#f1f5f9', color: '#475569'
                  }}>{el.aiAnalysis.severity} severity</span>
                  <span style={{
                    padding: '2px 10px', borderRadius: '999px',
                    fontSize: '11px', background: '#f1f5f9', color: '#475569'
                  }}>{el.aiAnalysis.confidence} confidence</span>
                </div>

                {/* Analysis body */}
                <div style={{padding:'16px', background:'#fff'}}>
                  {criticalNetworkFailure && (
                    <div style={{
                      marginBottom: '14px',
                      padding: '10px 12px',
                      borderRadius: '8px',
                      border: '1px solid #fecaca',
                      background: '#fff1f2'
                    }}>
                      <div style={{fontSize:'11px', fontWeight:700, color:'#b91c1c', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:'4px'}}>
                        Exact API Failure Detected
                      </div>
                      <div style={{fontSize:'13px', color:'#7f1d1d', lineHeight:'1.5'}}>
                        <strong>{criticalNetworkFailure.method} {criticalNetworkFailure.status}</strong> {criticalNetworkFailure.url}
                        {failureMessage && (
                          <div style={{marginTop:'4px'}}>
                            Response: <code>{failureMessage}</code>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                  <div style={{fontSize:'15px', fontWeight:600, color:'#0f172a', marginBottom:'16px'}}>
                    {el.aiAnalysis.headline}
                  </div>

                  {[
                    { label: '📋 What Happened', text: el.aiAnalysis.what_happened || el.aiAnalysis.description },
                    { label: '🔍 Root Cause', text: el.aiAnalysis.root_cause },
                    { label: '📁 Where to Look', text: el.aiAnalysis.where_to_look },
                    { label: '🔧 How to Fix', text: el.aiAnalysis.how_to_fix },
                    (el.aiAnalysis.code_hint || el.aiAnalysis.code_change_hint) && { label: '💻 Code Hint', text: el.aiAnalysis.code_hint || el.aiAnalysis.code_change_hint },
                    el.aiAnalysis.api_error_root_cause && { label: '🔌 API Error Root Cause', text: el.aiAnalysis.api_error_root_cause },
                    { label: '🛡️ Prevention', text: el.aiAnalysis.prevention },
                  ].filter(section => Boolean(section && section.text)).map((section, i) => (
                    <div key={i} style={{marginBottom:'12px'}}>
                      <div style={{
                        fontSize:'11px', fontWeight:700, color:'#64748b',
                        textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:'4px'
                      }}>{section.label}</div>
                      <div style={{
                        fontSize:'13px', color:'#334155', lineHeight:'1.6',
                        padding:'8px 12px', background:'#f8fafc',
                        borderRadius:'6px', borderLeft:'3px solid #e2e8f0',
                        whiteSpace:'pre-wrap'
                      }}>{section.text}</div>
                    </div>
                  ))}

                  {/* Ticket creation section */}
                  {el.aiAnalysis.ticket_worthy && (
                    <div style={{
                      marginTop:'16px', padding:'12px',
                      background:'#f0fdf4', borderRadius:'8px', border:'1px solid #bbf7d0'
                    }}>
                      <div style={{fontSize:'12px', fontWeight:700, color:'#166534', marginBottom:'8px'}}>
                        📋 Suggested Ticket
                      </div>
                      <div style={{fontSize:'13px', color:'#166534', marginBottom:'10px', fontWeight:500}}>
                        {el.aiAnalysis.ticket_title}
                      </div>
                      <div style={{display:'flex', gap:'8px', flexWrap:'wrap'}}>
                        <button onClick={() => {
                          const tag = (el.tags||[]).find(t=>t.name.startsWith('@MLR'))?.name || ''
                          alert(`To create tickets, run from terminal:\nnode e2e/scripts/post-e2e-failures.mjs\n\nScenario: ${el.name}\nTag: ${tag}`)
                        }} style={{
                          padding:'6px 14px', borderRadius:'6px', border:'none',
                          background:'#0052cc', color:'#fff', fontSize:'12px',
                          fontWeight:600, cursor:'pointer'
                        }}>🎫 Create Jira Ticket</button>
                        <button onClick={() => {
                          const tag = (el.tags||[]).find(t=>t.name.startsWith('@MLR'))?.name || ''
                          alert(`To create tickets, run from terminal:\nnode e2e/scripts/post-e2e-failures.mjs\n\nScenario: ${el.name}\nTag: ${tag}`)
                        }} style={{
                          padding:'6px 14px', borderRadius:'6px', border:'none',
                          background:'#24292f', color:'#fff', fontSize:'12px',
                          fontWeight:600, cursor:'pointer'
                        }}>🐙 Create GitHub Issue</button>
                      </div>
                    </div>
                  )}

                  {/* Manual re-analyze button */}
                  <div style={{marginTop:'12px', textAlign:'right'}}>
                    <button onClick={async () => {

              const requests = networkData.failed_requests || []
              const isFirstParty = (url) => /happilee\.io/i.test(String(url || ''))
              const critical = requests.filter(r => (r.status || 0) >= 400).sort((a, b) => (b.status || 0) - (a.status || 0))
              const prioritized = critical.filter(r => (r.status || 0) >= 500 || isFirstParty(r.url))
              const preview = (prioritized.length ? prioritized : critical).slice(0, 2)
              const noisy = critical.filter(r => !isFirstParty(r.url))
              
              return (
                <div style={{
                  margin: '16px 0',
                  borderRadius: '10px',
                  border: '1px solid #fbbf24',

                    background: '#fffbeb',

                      <span style={{ fontSize: '11px', color: '#b45309', background: '#fef3c7', padding: '3px 8px', borderRadius: '999px' }}>

                      </span>
                      <span style={{ fontSize: '11px', color: '#64748b', background: '#e2e8f0', padding: '3px 8px', borderRadius: '999px' }}>

                          alignItems:'center',

                          marginBottom:'8px',

                            padding:'2px 8px',
                            borderRadius:'4px',
                            fontSize:'12px',
                            fontWeight:700,

                            color:'#fff'

                          </span>

                            fontSize:'12px',
                            fontWeight:700,
                            color:'#374151',
                            background:'#e5e7eb',
                            padding:'2px 6px',
                            borderRadius:'4px'
                          }}>
                            {req.method}
                          </span>
                          <span style={{
                            fontSize:'12px',
                            color:'#1e40af',
                            wordBreak:'break-all',
                            flex:1
                          }}>
                            {String(req.url || '').length > 140 ? `${String(req.url).slice(0, 140)}...` : req.url}
                          </span>
                        </div>

                        {/* Response body if available */}
                        {req.responseBody && req.responseBody !== 'Could not read response' && (

                            <summary style={{
                              fontSize:'11px',
                              color:'#dc2626',
                              cursor:'pointer',
                              fontWeight:600
                            }}>
                              📄 Response Body

                              fontSize:'11px',

                              background:'#fef2f2',
                              padding:'8px',

                              wordBreak:'break-word',
                              maxHeight:'150px',
                              overflowY:'auto'

                        {/* Curl command */}

                              color:'#2563eb',
                              cursor:'pointer',

                                      setTimeout(() => { btn.textContent = original; }, 2000);

                                style={{
                                  position:'absolute',

                                  background:'#3b82f6',

                          </details>

                      </div>
                    ))}

                    <details>
                      <summary style={{
                        fontSize:'12px',
                        fontWeight:700,
                        color:'#475569',
                        cursor:'pointer',
                        marginTop:'6px'
                      }}>
                        Show all network failures ({requests.length})
                      </summary>
                      <div style={{ marginTop: '8px' }}>
                        {requests.map((req, i) => (
                          <div key={`all-${i}`} style={{
                            display: 'flex',
                            alignItems: 'center',
                            gap: '8px',
                            padding: '6px 4px',
                            borderBottom: '1px solid #f1f5f9',
                            fontSize: '11px'
                          }}>
                            <span style={{
                              padding: '2px 6px',
                              borderRadius: '4px',
                              background: (req.status || 0) >= 500 ? '#dc2626' : (req.status || 0) >= 400 ? '#d97706' : '#64748b',
                              color: '#fff',
                              fontWeight: 700,

                              textAlign: 'center'
                            }}>{req.status || 'ERR'}</span>
                            <span style={{ fontWeight: 700, color: '#334155', minWidth: '48px' }}>{req.method}</span>
                            <span style={{ color: '#475569', wordBreak: 'break-all', flex: 1 }}>{req.url}</span>

                  </div>

          </div>}
        </div>
